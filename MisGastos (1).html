<title>MisGastos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0c0c0f;color:#ede8d8;font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;overscroll-behavior:none;}
input,select,button{font-family:'DM Sans',sans-serif;}
.save-banner{position:fixed;top:0;left:0;right:0;background:#1a2e0a;color:#4ecb4e;font-size:12px;font-weight:600;text-align:center;padding:6px;z-index:300;transform:translateY(-100%);transition:transform .3s;}
.save-banner.show{transform:translateY(0);}
#offline-badge{display:none;position:fixed;top:6px;right:10px;background:#2a1010;color:#e05a5a;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;z-index:400;border:1px solid #5a2020;}
.hdr{background:#111114;border-bottom:1px solid #222;padding:16px 16px 0;position:sticky;top:0;z-index:50;}
.app-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#ede8d8;}
.app-sub{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;}
.main-nav{display:flex;border-bottom:1px solid #222;margin-top:12px;overflow-x:auto;scrollbar-width:none;}
.main-nav::-webkit-scrollbar{display:none;}
.mnav-btn{flex:1;min-width:52px;padding:8px 2px 10px;border:none;background:none;font-size:9px;font-weight:600;color:#555;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mnav-btn .nic{font-size:15px;}
.mnav-btn.active{color:#c9a84c;border-bottom-color:#c9a84c;}
.month-nav{display:flex;align-items:center;gap:8px;padding:12px 16px 0;}
.month-btn{background:#1e1e22;border:1px solid #2a2a30;color:#aaa;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.month-label{font-size:13px;font-weight:600;color:#c9a84c;text-transform:capitalize;flex:1;text-align:center;}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px;}
.sum-wide{grid-column:1/-1;}
.scard{border-radius:14px;padding:13px 14px;}
.scard-bal{background:linear-gradient(135deg,#c9a84c,#a87d2a);}
.scard-in{background:#0f1f0f;border:1px solid #1e3d1e;}
.scard-ex{background:#1f0f0f;border:1px solid #3d1e1e;}
.scard-cc{background:#0f0f1f;border:1px solid #1e1e3d;}
.scard-fi{background:#1f100a;border:1px solid #4a2a10;}
.scard-fx{background:#0a1a1f;border:1px solid #104a3a;}
.scard-ln{background:#1a0a1f;border:1px solid #3a104a;}
.scard-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.65;margin-bottom:5px;}
.scard-amt{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;}
.scard-bal .scard-lbl,.scard-bal .scard-amt{color:#0c0c0f;}
.scard-in .scard-amt{color:#4ecb4e;}.scard-ex .scard-amt{color:#e05a5a;}.scard-cc .scard-amt{color:#7b87f5;}
.scard-fi .scard-amt{color:#e8893a;}.scard-fx .scard-amt{color:#3ecbba;}.scard-ln .scard-amt{color:#c97bf5;}
.scard-sub{font-size:10px;color:#666;margin-top:2px;}
.page{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.page-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 0 2px;}
.page-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#ede8d8;}
.add-btn{background:#1c180a;border:1px solid #c9a84c;border-radius:10px;color:#c9a84c;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;}
.sub-tabs{display:flex;gap:2px;border-bottom:1px solid #222;overflow-x:auto;scrollbar-width:none;}
.sub-tabs::-webkit-scrollbar{display:none;}
.stab{padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:#555;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .18s;}
.stab.active{color:#c9a84c;border-bottom-color:#c9a84c;}
.card{background:#141418;border:1px solid #202028;border-radius:14px;overflow:hidden;}
.card-row{display:flex;align-items:center;gap:11px;padding:12px 14px;}
.card-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.card-ic.inc{background:#0f1f0f;}.card-ic.exp{background:#1f0f0f;}.card-ic.cc{background:#0f0f1f;}
.card-ic.fi{background:#1f100a;}.card-ic.fx{background:#0a1a1f;}.card-ic.ln{background:#1a0a1f;}
.card-body{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:500;color:#ddd5bb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{font-size:11px;color:#555;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.card-right{text-align:right;flex-shrink:0;}
.card-amt{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
.card-amt.inc{color:#4ecb4e;}.card-amt.exp{color:#e05a5a;}.card-amt.cc{color:#7b87f5;}
.card-amt.fi{color:#e8893a;}.card-amt.fx{color:#3ecbba;}.card-amt.ln{color:#c97bf5;}
.card-actions{display:flex;gap:5px;margin-top:5px;justify-content:flex-end;flex-wrap:wrap;}
.act{border:none;cursor:pointer;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:500;white-space:nowrap;}
.act-edit{background:#222;color:#999;}.act-del{background:#2a1212;color:#e05a5a;}
.act-pay{background:#1a2e0a;color:#4ecb4e;}.act-tog{background:#1c180a;color:#c9a84c;}
.badge{background:#1e1e28;border:1px solid #2a2a3a;border-radius:5px;padding:1px 6px;font-size:10px;color:#7b87f5;white-space:nowrap;}
.badge.green{color:#4ecb4e;border-color:#1e3d1e;background:#0f1f0f;}
.badge.orange{color:#e8893a;border-color:#3a2010;background:#1a0f05;}
.progress-wrap{height:4px;background:#222;border-radius:2px;overflow:hidden;margin-top:6px;}
.progress-bar{height:100%;border-radius:2px;}
.quota-list{background:#0f0f1c;border:1px solid #1e1e3d;border-radius:10px;margin:0 14px 14px;overflow:hidden;}
.quota-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #181828;gap:10px;}
.quota-row:last-child{border-bottom:none;}
.quota-num{font-size:10px;color:#555;width:50px;}
.quota-month{font-size:12px;color:#aaa;flex:1;text-transform:capitalize;}
.quota-amt{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#7b87f5;}
.quota-cur{background:#1e1e3d;}
.quota-cur .quota-month{color:#c9a84c;}.quota-cur .quota-amt{color:#c9a84c;}
.store-card{background:#141418;border-radius:14px;overflow:hidden;border:1px solid #2a1e10;}
.store-hdr{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;}
.store-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.store-items{border-top:1px solid #2a1e10;}
.fi-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid #1e150a;}
.fi-row:last-child{border-bottom:none;}
.fi-row-body{flex:1;min-width:0;}
.fi-row-desc{font-size:13px;color:#c8bfa0;}
.fi-row-date{font-size:10px;color:#555;margin-top:2px;}
.fi-row-acts{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.store-footer{padding:10px 14px;background:#0f0a05;display:flex;justify-content:space-between;align-items:center;}
.new-store-btn{background:#1f100a;border:1px solid #3a2010;border-radius:12px;padding:13px 14px;cursor:pointer;text-align:center;font-size:13px;color:#e8893a;display:flex;align-items:center;justify-content:center;gap:8px;}
.paid-tag{font-size:10px;color:#4ecb4e;background:#0f1f0f;border:1px solid #1e3d1e;border-radius:5px;padding:1px 6px;}
.sec-hdr{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;padding:8px 0 2px;}
.fab{position:fixed;bottom:20px;right:16px;width:54px;height:54px;border-radius:50%;background:#c9a84c;border:none;cursor:pointer;font-size:28px;color:#0c0c0f;box-shadow:0 4px 20px rgba(201,168,76,.5);display:flex;align-items:center;justify-content:center;z-index:100;font-weight:700;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#141418;border-radius:22px 22px 0 0;width:100%;padding:20px 16px 36px;border-top:1px solid #2a2a30;max-height:92vh;overflow-y:auto;}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:16px;color:#ede8d8;}
.toggle4{display:flex;background:#0c0c0f;border-radius:11px;padding:4px;gap:3px;margin-bottom:14px;flex-wrap:wrap;}
.t4btn{flex:1;min-width:55px;padding:8px 3px;border:none;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:#555;text-align:center;}
.t4btn.exp{background:#2a1010;color:#e05a5a;}.t4btn.inc{background:#0f2010;color:#4ecb4e;}
.t4btn.crd{background:#10102a;color:#7b87f5;}.t4btn.fid{background:#2a1005;color:#e8893a;}
.flabel{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#555;margin-bottom:6px;}
.fgroup{margin-bottom:13px;}
.finput{width:100%;background:#0c0c0f;border:1px solid #222;border-radius:10px;color:#ede8d8;font-size:15px;padding:11px 13px;outline:none;}
.finput:focus{border-color:#c9a84c;}
select.finput{appearance:none;-webkit-appearance:none;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.cbt{background:#0c0c0f;border:1px solid #222;border-radius:10px;padding:9px 4px;cursor:pointer;text-align:center;}
.cbt.sel{border-color:#c9a84c;background:#1c180a;}
.cbt-ic{font-size:18px;}.cbt-nm{font-size:10px;color:#666;margin-top:3px;}
.cbt.sel .cbt-nm{color:#c9a84c;}
.icon-grid{display:flex;flex-wrap:wrap;gap:8px;}
.icbtn{width:40px;height:40px;border-radius:10px;background:#0c0c0f;border:1px solid #222;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.icbtn.sel{border-color:#c9a84c;background:#1c180a;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-dot.sel{border-color:#fff;}
.cc-box{background:#10102a;border:1px solid #1e1e3d;border-radius:12px;padding:13px 14px;margin-bottom:14px;}
.fi-box{background:#1f100a;border:1px solid #3a2010;border-radius:12px;padding:13px 14px;margin-bottom:14px;}
.box-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.cc-box .box-title{color:#7b87f5;}.fi-box .box-title{color:#e8893a;}
.btn-sub{width:100%;padding:14px;background:#c9a84c;border:none;border-radius:13px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#0c0c0f;cursor:pointer;margin-top:14px;}
.btn-can{width:100%;padding:11px;background:transparent;border:1px solid #222;border-radius:12px;font-size:14px;color:#555;cursor:pointer;margin-top:8px;}
.empty{text-align:center;padding:36px 20px;color:#333;font-size:14px;}
.inactive-tag{font-size:10px;color:#555;background:#1a1a1a;border:1px solid #333;border-radius:5px;padding:1px 6px;}
.subtotal-row{border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
</style>
</head>
<body>
<div class="save-banner" id="saveBanner">вң“ Guardado</div>
<div id="offline-badge">Sin internet</div>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
function updateOnline(){document.getElementById('offline-badge').style.display=navigator.onLine?'none':'block';}
window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);updateOnline();
function showSaveBanner(){var b=document.getElementById('saveBanner');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),1500);}
</script>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;

const fmt=n=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n||0);
const fmtDate=s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('es-AR',{day:'numeric',month:'short'});};
const fmtMonth=s=>{if(!s)return'';const d=new Date(s+'-01T00:00:00');return d.toLocaleDateString('es-AR',{month:'long',year:'numeric'});};
const todayStr=()=>new Date().toISOString().split('T')[0];
const thisMonthStr=()=>new Date().toISOString().slice(0,7);
const addMonths=(s,n)=>{const[y,m]=s.split('-').map(Number);const d=new Date(y,m-1+n,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
const daysUntil=day=>{const now=new Date();const t=new Date(now.getFullYear(),now.getMonth(),day);if(t<now)t.setMonth(t.getMonth()+1);return Math.ceil((t-now)/86400000);};
const urgColor=d=>d<=3?'#e05a5a':d<=7?'#e8893a':'#4ecb4e';

const DEFAULT_CATS={
  income:[{id:'salary',label:'Salario',icon:'рҹ’ј'},{id:'freelance',label:'Freelance',icon:'рҹ’»'},{id:'investment',label:'InversiГіn',icon:'рҹ“Ҳ'},{id:'gift',label:'Regalo',icon:'рҹҺҒ'},{id:'other_in',label:'Otro',icon:'вһ•'}],
  expense:[{id:'food',label:'Comida',icon:'рҹҚҪпёҸ'},{id:'transport',label:'Transporte',icon:'рҹҡ—'},{id:'housing',label:'Vivienda',icon:'рҹҸ '},{id:'health',label:'Salud',icon:'рҹ’Ҡ'},{id:'entertainment',label:'Ocio',icon:'рҹҺ¬'},{id:'clothing',label:'Ropa',icon:'рҹ‘•'},{id:'education',label:'EducaciГіn',icon:'рҹ“ҡ'},{id:'services',label:'Servicios',icon:'вҡЎ'},{id:'tech',label:'TecnologГӯa',icon:'рҹ“ұ'},{id:'other_ex',label:'Otro',icon:'вһ–'}]
};
const FIXED_ICONS=['вҡЎ','рҹ’§','рҹ”Ҙ','рҹ“Ў','рҹ“ұ','рҹҸ ','рҹҡ—','рҹ“ә','рҹҢҗ','рҹҸӢпёҸ','рҹ“°','рҹҺө','рҹ“Ӣ'];
const CARDS=['Visa','Mastercard','American Express','Naranja X','MODO','Otro'];
const STORE_COLORS=['#c9602a','#2a7ac9','#2ab06f','#9b2ac9','#c9a82a','#c92a5a'];
const LOAN_ICONS=['рҹҸҰ','рҹҸ ','рҹҡ—','рҹ“ұ','рҹ’Ҡ','рҹҺ“','рҹ’°','рҹ“Ӣ'];
const EMOJI_OPTIONS=['рҹ’ј','рҹ’»','рҹ“Ҳ','рҹҺҒ','вһ•','рҹҚҪпёҸ','рҹҡ—','рҹҸ ','рҹ’Ҡ','рҹҺ¬','рҹ‘•','рҹ“ҡ','вҡЎ','рҹ“ұ','вһ–','рҹӣ’','вҳ•','рҹҚ•','рҹҺ®','вңҲпёҸ','рҹҸӢпёҸ','рҹ’Ҳ','рҹҗҫ','рҹҺ“','рҹ”§','рҹҸҰ','рҹ’°','рҹҺө','рҹҺЁ','вҡҪ','рҹ§ҙ','рҹ§№','рҹҚә','рҹ§ғ','рҹҢҝ','рҹ’Ў','рҹ”‘','рҹҺҖ','рҹӣө','рҹҡҝ','рҹҸҘ','рҹ’…','рҹ“Ұ','рҹ§ҫ','рҹҺҜ','рҹӣҚпёҸ','рҹҚ«','рҹҺІ'];

const ACC_ICONS=['рҹҸҰ','рҹ’і','рҹ“ұ','рҹ’°','рҹҸ§','рҹҢҗ','вӯҗ','рҹ’Һ'];
const ACC_COLORS=['#2a7ac9','#c9602a','#2ab06f','#9b2ac9','#c9a82a','#c92a5a','#3ecbba','#7b87f5'];

const expandCC=tx=>{
  const{id,totalAmount,installments,startMonth,description,category,cardName}=tx;
  const per=Math.round(totalAmount/installments);
  return Array.from({length:installments},(_,i)=>({parentId:id,month:addMonths(startMonth,i),quotaNum:i+1,description,category,cardName,amount:i===installments-1?totalAmount-per*(installments-1):per}));
};

const emptyTx=()=>({type:'expense',paymentMethod:'cash',category:'',description:'',amount:'',date:todayStr(),cardName:'Visa',installments:'1',startMonth:thisMonthStr(),storeName:'',accountId:'acc_efectivo'});
const emptyFixed=()=>({name:'',icon:'вҡЎ',amount:'',dueDay:'1'});
const emptyLoan=()=>({name:'',icon:'рҹҸҰ',totalAmount:'',monthlyPayment:'',dueDay:'1',startMonth:thisMonthStr(),totalInstallments:'',paidInstallments:'0'});

const KEYS={tx:'mg_tx',stores:'mg_stores',fiado:'mg_fiado',fixed:'mg_fixed',loans:'mg_loans',cats:'mg_cats',fpaid:'mg_fpaid',accs:'mg_accs'};
const load=(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

function App(){
  const [transactions,setTransactions]=useState(()=>load(KEYS.tx,[]));
  const [stores,setStores]=useState(()=>load(KEYS.stores,[]));
  const [fiado,setFiado]=useState(()=>load(KEYS.fiado,[]));
  const [fixed,setFixed]=useState(()=>load(KEYS.fixed,[
    {id:'fx1',name:'Alquiler',icon:'рҹҸ ',amount:500000,dueDay:5,active:true},
    {id:'fx2',name:'Luz',icon:'вҡЎ',amount:59222,dueDay:11,active:true},
    {id:'fx3',name:'Gas',icon:'рҹ”Ҙ',amount:46931,dueDay:2,active:true},
    {id:'fx4',name:'Internet',icon:'рҹҢҗ',amount:62936,dueDay:5,active:true},
    {id:'fx5',name:'Escuela',icon:'рҹҸ ',amount:262000,dueDay:10,active:true},
    {id:'fx6',name:'Agua',icon:'рҹ’§',amount:92000,dueDay:10,active:true},
    {id:'fx7',name:'Academia inglГ©s',icon:'рҹҢҗ',amount:100000,dueDay:10,active:true},
  ]));
  const [loans,setLoans]=useState(()=>load(KEYS.loans,[
    {id:'l1',name:'PrГ©stamo Mercado Pago',icon:'рҹҸҰ',totalAmount:721848,monthlyPayment:60154,dueDay:11,startMonth:'2025-09',totalInstallments:12,paidInstallments:9,active:true},
    {id:'l2',name:'Banco Supervielle',icon:'рҹҸҰ',totalAmount:5320128,monthlyPayment:110761,dueDay:5,startMonth:'2024-12',totalInstallments:48,paidInstallments:14,active:true},
    {id:'l3',name:'Banco Galicia',icon:'рҹҸҰ',totalAmount:4988490,monthlyPayment:277085,dueDay:20,startMonth:'2025-07',totalInstallments:18,paidInstallments:5,active:true},
  ]));
  const [categories,setCategories]=useState(()=>load(KEYS.cats,DEFAULT_CATS));
  const [accounts,setAccounts]=useState(()=>load(KEYS.accs,[
    {id:'acc_efectivo',name:'Efectivo',icon:'рҹ’°',color:'#c9a82a',balance:0,type:'cash'},
  ]));
  const [fixedPaid,setFixedPaid]=useState(()=>load(KEYS.fpaid,{}));

  useEffect(()=>{save(KEYS.accs,accounts);},[accounts]);
  useEffect(()=>{save(KEYS.cats,categories);},[categories]);
  useEffect(()=>{save(KEYS.fpaid,fixedPaid);},[fixedPaid]);
  useEffect(()=>{save(KEYS.tx,transactions);showSaveBanner();},[transactions]);
  useEffect(()=>{save(KEYS.stores,stores);},[stores]);
  useEffect(()=>{save(KEYS.fiado,fiado);showSaveBanner();},[fiado]);
  useEffect(()=>{save(KEYS.fixed,fixed);showSaveBanner();},[fixed]);
  useEffect(()=>{save(KEYS.loans,loans);showSaveBanner();},[loans]);

  const [mainTab,setMainTab]=useState('resumen');
  const [movTab,setMovTab]=useState('all');
  const [viewMonth,setViewMonth]=useState(thisMonthStr());
  const [showTxForm,setShowTxForm]=useState(false);
  const [showFixedForm,setShowFixedForm]=useState(false);
  const [showLoanForm,setShowLoanForm]=useState(false);
  const [showStoreModal,setShowStoreModal]=useState(false);
  const [showAccForm,setShowAccForm]=useState(false);
  const [editAccId,setEditAccId]=useState(null);
  const [accForm,setAccForm]=useState({name:'',icon:'рҹҸҰ',color:'#2a7ac9',balance:'',type:'bank'});
  const [showCatForm,setShowCatForm]=useState(false);
  const [showFixedPicker,setShowFixedPicker]=useState(false);
  const [txForm,setTxForm]=useState(emptyTx());
  const [fixedForm,setFixedForm]=useState(emptyFixed());
  const [loanForm,setLoanForm]=useState(emptyLoan());
  const [catForm,setCatForm]=useState({label:'',icon:'рҹӣ’'});
  const [catFormType,setCatFormType]=useState('expense');
  const [catTabType,setCatTabType]=useState('expense');
  const [editCatId,setEditCatId]=useState(null);
  const [editFixedId,setEditFixedId]=useState(null);
  const [editLoanId,setEditLoanId]=useState(null);
  const [newStoreName,setNewStoreName]=useState('');
  const [newStoreColor,setNewStoreColor]=useState('#c9602a');
  const [expandedCC,setExpandedCC]=useState(null);
  const [expandedStore,setExpandedStore]=useState(null);

  const ccThisMonth=useMemo(()=>transactions.filter(t=>t.paymentMethod==='credit').flatMap(expandCC).filter(q=>q.month===viewMonth),[transactions,viewMonth]);
  const totalCC=useMemo(()=>ccThisMonth.reduce((s,q)=>s+q.amount,0),[ccThisMonth]);
  const cashMonth=useMemo(()=>transactions.filter(t=>t.date&&t.date.slice(0,7)===viewMonth&&t.paymentMethod==='cash'),[transactions,viewMonth]);
  const totalIncome=useMemo(()=>cashMonth.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),[cashMonth]);
  const totalCashExp=useMemo(()=>cashMonth.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),[cashMonth]);
  const fiadoByStore=useMemo(()=>{const m={};stores.forEach(s=>{const items=fiado.filter(f=>f.storeId===s.id&&!f.paid);m[s.id]={total:items.reduce((a,f)=>a+f.amount,0),items};});return m;},[stores,fiado]);
  const totalFiado=useMemo(()=>Object.values(fiadoByStore).reduce((s,v)=>s+v.total,0),[fiadoByStore]);
  const totalFixed=useMemo(()=>fixed.filter(f=>f.active).reduce((s,f)=>s+f.amount,0),[fixed]);
  const totalLoans=useMemo(()=>loans.filter(l=>l.active&&l.paidInstallments<l.totalInstallments).reduce((s,l)=>s+l.monthlyPayment,0),[loans]);
  const totalPagar=totalCashExp+totalFixed+totalLoans+totalCC+totalFiado;
  const balance=totalIncome-totalPagar;

  const getCat=id=>{const a=[...categories.income,...categories.expense];return a.find(c=>c.id===id)||{label:id,icon:'вқ“'};};
  const getAcc=id=>accounts.find(a=>a.id===id)||{name:'Efectivo',icon:'рҹ’°',color:'#c9a82a'};
  
  const accountBalances=useMemo(()=>{
    const balances={};
    accounts.forEach(acc=>{balances[acc.id]=acc.balance||0;});
    transactions.filter(t=>t.paymentMethod==='cash').forEach(t=>{
      const aid=t.accountId||'acc_efectivo';
      if(balances[aid]===undefined)balances[aid]=0;
      if(t.type==='income') balances[aid]+=t.amount;
      else balances[aid]-=t.amount;
    });
    return balances;
  },[accounts,transactions]);

  const feedItems=useMemo(()=>{
    if(movTab==='credit')return transactions.filter(t=>t.paymentMethod==='credit').sort((a,b)=>b.date.localeCompare(a.date));
    const base=cashMonth.filter(t=>movTab==='all'?true:t.type===movTab);
    return [...base].sort((a,b)=>b.date.localeCompare(a.date));
  },[movTab,cashMonth,transactions]);

  // Handlers
  const handleAccSubmit=()=>{
    const f=accForm;if(!f.name.trim())return;
    const item={...f,balance:parseFloat(f.balance||0)};
    if(editAccId){
      setAccounts(p=>p.map(a=>a.id===editAccId?{...a,...item}:a));
      setEditAccId(null);
    }else{
      setAccounts(p=>[...p,{...item,id:'acc'+Date.now()}]);
    }
    setAccForm({name:'',icon:'рҹҸҰ',color:'#2a7ac9',balance:'',type:'bank'});
    setShowAccForm(false);
  };

  const handleTxSubmit=()=>{
    const f=txForm;if(!f.description||!f.amount)return;
    if(f.paymentMethod==='fiado'){
      if(!f.storeName)return;
      let s=stores.find(x=>x.name===f.storeName);
      if(!s){s={id:'s'+Date.now(),name:f.storeName,color:'#c9602a'};setStores(p=>[...p,s]);}
      setFiado(p=>[...p,{id:'f'+Date.now(),storeId:s.id,description:f.description,amount:parseFloat(f.amount),date:f.date,paid:false}]);
    }else if(f.paymentMethod==='credit'){
      if(!f.category)return;
      setTransactions(p=>[...p,{id:Date.now(),type:'expense',paymentMethod:'credit',category:f.category,description:f.description,date:f.date,totalAmount:parseFloat(f.amount),installments:parseInt(f.installments),startMonth:f.startMonth,cardName:f.cardName}]);
    }else{
      if(!f.category)return;
      setTransactions(p=>[...p,{id:Date.now(),type:f.type,paymentMethod:'cash',category:f.category,description:f.description,amount:parseFloat(f.amount),date:f.date}]);
    }
    setTxForm(emptyTx());setShowTxForm(false);
  };

  const handleFixedSubmit=()=>{
    const f=fixedForm;if(!f.name||!f.amount||!f.dueDay)return;
    const item={...f,amount:parseFloat(f.amount),dueDay:parseInt(f.dueDay),active:true};
    if(editFixedId){setFixed(p=>p.map(x=>x.id===editFixedId?{...x,...item}:x));setEditFixedId(null);}
    else setFixed(p=>[...p,{...item,id:'fx'+Date.now()}]);
    setFixedForm(emptyFixed());setShowFixedForm(false);
  };

  const handleLoanSubmit=()=>{
    const f=loanForm;if(!f.name||!f.monthlyPayment||!f.dueDay||!f.totalInstallments)return;
    const item={...f,totalAmount:parseFloat(f.totalAmount||0),monthlyPayment:parseFloat(f.monthlyPayment),dueDay:parseInt(f.dueDay),totalInstallments:parseInt(f.totalInstallments),paidInstallments:parseInt(f.paidInstallments||0),active:true};
    if(editLoanId){setLoans(p=>p.map(x=>x.id===editLoanId?{...x,...item}:x));setEditLoanId(null);}
    else setLoans(p=>[...p,{...item,id:'l'+Date.now()}]);
    setLoanForm(emptyLoan());setShowLoanForm(false);
  };

  const handleCatSubmit=()=>{
    if(!catForm.label.trim())return;
    const type=catFormType;
    if(editCatId){
      setCategories(prev=>({...prev,[type]:prev[type].map(c=>c.id===editCatId?{...c,label:catForm.label,icon:catForm.icon}:c)}));
      setEditCatId(null);
    }else{
      setCategories(prev=>({...prev,[type]:[...prev[type],{id:'cat'+Date.now(),label:catForm.label.trim(),icon:catForm.icon}]}));
    }
    setCatForm({label:'',icon:'рҹӣ’'});setShowCatForm(false);
  };

  const NAV=[['resumen','рҹ“Ҡ','Resumen'],['cuentas','рҹҸҰ','Cuentas'],['apagar','рҹ’і','A Pagar'],['movimientos','рҹ’ё','Movim.'],['fijos','рҹ“Ң','Fijos'],['prestamos','рҹҸҰ','PrГ©stamos'],['fiado','рҹҸӘ','Fiado'],['categorias','вҡҷпёҸ','Categ.']];

  return (
    <div style={{minHeight:'100vh',background:'#0c0c0f',paddingBottom:80}}>
      <div className="hdr">
        <div className="app-name">MisGastos</div>
        <div className="app-sub">Control financiero personal</div>
        <div className="main-nav">
          {NAV.map(([k,ic,l])=>(
            <button key={k} className={'mnav-btn'+(mainTab===k?' active':'')} onClick={()=>setMainTab(k)}>
              <span className="nic">{ic}</span>{l}
            </button>
          ))}
        </div>
      </div>

      {/* в•җв•җ RESUMEN в•җв•җ */}
      {mainTab==='resumen'&&(
        <>
          <div className="month-nav">
            <button className="month-btn" onClick={()=>setViewMonth(m=>addMonths(m,-1))}>вҖ№</button>
            <div className="month-label">{fmtMonth(viewMonth)}</div>
            <button className="month-btn" onClick={()=>setViewMonth(m=>addMonths(m,1))}>вҖә</button>
          </div>
          <div className="summary">
            <div className="scard scard-bal sum-wide">
              <div className="scard-lbl">Balance del mes</div>
              <div className="scard-amt">{fmt(balance)}</div>
              <div className="scard-sub" style={{color:'rgba(0,0,0,.5)'}}>Ingresos вҲ’ todos los compromisos</div>
            </div>
            <div className="scard scard-in"><div className="scard-lbl">рҹ’° Ingresos</div><div className="scard-amt">{fmt(totalIncome)}</div></div>
            <div className="scard scard-ex"><div className="scard-lbl">рҹ’ё Gastos</div><div className="scard-amt">{fmt(totalCashExp)}</div></div>
            <div className="scard scard-fx"><div className="scard-lbl">рҹ“Ң Gastos fijos</div><div className="scard-amt">{fmt(totalFixed)}</div><div className="scard-sub">{fixed.filter(f=>f.active).length} servicios</div></div>
            <div className="scard scard-ln"><div className="scard-lbl">рҹҸҰ PrГ©stamos</div><div className="scard-amt">{fmt(totalLoans)}</div></div>
            <div className="scard scard-cc"><div className="scard-lbl">рҹ’і Tarjeta</div><div className="scard-amt">{fmt(totalCC)}</div><div className="scard-sub">{ccThisMonth.length} cuota(s)</div></div>
            <div className="scard scard-fi"><div className="scard-lbl">рҹҸӘ Fiado</div><div className="scard-amt">{fmt(totalFiado)}</div></div>
          </div>
          <div className="page" style={{paddingTop:4}}>
            <div className="sec-hdr">Vencimientos prГіximos</div>
            {[...fixed.filter(f=>f.active),...loans.filter(l=>l.active&&l.paidInstallments<l.totalInstallments)].sort((a,b)=>a.dueDay-b.dueDay).map(item=>{
              const isL=!!item.monthlyPayment;const d=daysUntil(item.dueDay);const col=urgColor(d);
              return(<div key={item.id} className="card"><div className="card-row">
                <div className={'card-ic '+(isL?'ln':'fx')}>{item.icon}</div>
                <div className="card-body"><div className="card-title">{item.name}</div><div className="card-meta"><span style={{color:col,fontWeight:600}}>в—Ҹ dГӯa {item.dueDay}</span><span style={{color:'#555'}}>В· {d} dГӯa(s)</span></div></div>
                <div className="card-right"><div className={'card-amt '+(isL?'ln':'fx')}>{fmt(isL?item.monthlyPayment:item.amount)}</div></div>
              </div></div>);
            })}
          </div>
        </>
      )}

      {/* в•җв•җ CUENTAS в•җв•җ */}
      {mainTab==='cuentas'&&(
        <div className="page">
          <div className="page-hdr">
            <div><div className="page-title">рҹҸҰ Mis Cuentas</div>
              <div style={{fontSize:11,color:'#555',marginTop:2}}>
                Total disponible: <span style={{color:'#4ecb4e',fontWeight:700}}>{fmt(Object.values(accountBalances).reduce((s,v)=>s+v,0))}</span>
              </div>
            </div>
            <button className="add-btn" onClick={()=>{setAccForm({name:'',icon:'рҹҸҰ',color:'#2a7ac9',balance:'',type:'bank'});setEditAccId(null);setShowAccForm(true);}}>+ Agregar</button>
          </div>

          {accounts.length===0&&<div className="empty">No hay cuentas registradas</div>}

          {accounts.map(acc=>{
            const bal=accountBalances[acc.id]||0;
            return(
              <div key={acc.id} className="card" style={{border:'1px solid '+acc.color+'44'}}>
                <div className="card-row">
                  <div style={{width:44,height:44,borderRadius:12,background:acc.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{acc.icon}</div>
                  <div className="card-body">
                    <div className="card-title">{acc.name}</div>
                    <div className="card-meta">
                      <span style={{color:acc.color,fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>{acc.type==='cash'?'Efectivo':acc.type==='wallet'?'Billetera virtual':'Banco'}</span>
                    </div>
                  </div>
                  <div className="card-right">
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:bal>=0?acc.color:'#e05a5a'}}>{fmt(bal)}</div>
                    <div style={{fontSize:10,color:'#555',marginTop:2}}>Saldo inicial: {fmt(acc.balance||0)}</div>
                    <div className="card-actions">
                      <button className="act act-edit" onClick={()=>{setAccForm({name:acc.name,icon:acc.icon,color:acc.color,balance:String(acc.balance||0),type:acc.type});setEditAccId(acc.id);setShowAccForm(true);}}>вңҸпёҸ</button>
                      {acc.id!=='acc_efectivo'&&<button className="act act-del" onClick={()=>setAccounts(p=>p.filter(a=>a.id!==acc.id))}>вң•</button>}
                    </div>
                  </div>
                </div>
                {/* Movimientos de esta cuenta */}
                {transactions.filter(t=>t.paymentMethod==='cash'&&(t.accountId||'acc_efectivo')===acc.id).length>0&&(
                  <div style={{borderTop:'1px solid '+acc.color+'22',padding:'8px 14px'}}>
                    <div style={{fontSize:10,color:'#555',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Гҡltimos movimientos</div>
                    {[...transactions.filter(t=>t.paymentMethod==='cash'&&(t.accountId||'acc_efectivo')===acc.id)].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3).map(t=>(
                      <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                        <span style={{fontSize:12,color:'#888'}}>{getCat(t.category).icon} {t.description}</span>
                        <span style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:t.type==='income'?'#4ecb4e':'#e05a5a'}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}

          <button className="fab" onClick={()=>{setAccForm({name:'',icon:'рҹҸҰ',color:'#2a7ac9',balance:'',type:'bank'});setEditAccId(null);setShowAccForm(true);}}>+</button>
        </div>
      )}

      {/* в•җв•җ A PAGAR в•җв•җ */}
      {mainTab==='apagar'&&(
        <>
          <div className="month-nav">
            <button className="month-btn" onClick={()=>setViewMonth(m=>addMonths(m,-1))}>вҖ№</button>
            <div className="month-label">{fmtMonth(viewMonth)}</div>
            <button className="month-btn" onClick={()=>setViewMonth(m=>addMonths(m,1))}>вҖә</button>
          </div>
          <div className="page" style={{paddingTop:8}}>
            <div className="sec-hdr">рҹ’° Ingresos del mes</div>
            {cashMonth.filter(t=>t.type==='income').length===0
              ?<div style={{font:'500 12px DM Sans',color:'#444',padding:'4px 0'}}>Sin ingresos este mes</div>
              :cashMonth.filter(t=>t.type==='income').map(t=>(
                <div key={t.id} className="card"><div className="card-row">
                  <div className="card-ic inc">{getCat(t.category).icon}</div>
                  <div className="card-body"><div className="card-title">{t.description}</div><div className="card-meta">{getCat(t.category).label} В· {fmtDate(t.date)}</div></div>
                  <div className="card-right"><div className="card-amt inc">+{fmt(t.amount)}</div></div>
                </div></div>
              ))
            }
            <div className="subtotal-row" style={{background:'#0f1f0f',border:'1px solid #1e3d1e'}}>
              <span style={{font:'600 12px DM Sans',color:'#4ecb4e'}}>Total ingresos</span>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:'#4ecb4e'}}>+{fmt(totalIncome)}</span>
            </div>

            {cashMonth.filter(t=>t.type==='expense').length>0&&<>
              <div className="sec-hdr" style={{marginTop:4}}>рҹ’ё Gastos en efectivo</div>
              {cashMonth.filter(t=>t.type==='expense').map(t=>(
                <div key={t.id} className="card"><div className="card-row">
                  <div className="card-ic exp">{getCat(t.category).icon}</div>
                  <div className="card-body"><div className="card-title">{t.description}</div><div className="card-meta">{getCat(t.category).label} В· {fmtDate(t.date)}</div></div>
                  <div className="card-right"><div className="card-amt exp">-{fmt(t.amount)}</div></div>
                </div></div>
              ))}
              <div className="subtotal-row" style={{background:'#1f0f0f',border:'1px solid #3d1e1e'}}>
                <span style={{font:'600 12px DM Sans',color:'#e05a5a'}}>Subtotal efectivo</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:'#e05a5a'}}>-{fmt(totalCashExp)}</span>
              </div>
            </>}

            {fixed.filter(f=>f.active).length>0&&<>
              <div className="sec-hdr" style={{marginTop:4}}>рҹ“Ң Gastos fijos</div>
              {fixed.filter(f=>f.active).map(fx=>{
                const d=daysUntil(fx.dueDay);
                return(<div key={fx.id} className="card"><div className="card-row">
                  <div className="card-ic fx">{fx.icon}</div>
                  <div className="card-body"><div className="card-title">{fx.name}</div><div className="card-meta"><span style={{color:urgColor(d),fontWeight:600}}>в—Ҹ Vence dГӯa {fx.dueDay}</span><span style={{color:'#555'}}>В· {d} dГӯa(s)</span></div></div>
                  <div className="card-right"><div className="card-amt fx">-{fmt(fx.amount)}</div></div>
                </div></div>);
              })}
              <div className="subtotal-row" style={{background:'#0a1a1f',border:'1px solid #104a3a'}}>
                <span style={{font:'600 12px DM Sans',color:'#3ecbba'}}>Subtotal fijos</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:'#3ecbba'}}>-{fmt(totalFixed)}</span>
              </div>
            </>}

            {loans.filter(l=>l.active&&l.paidInstallments<l.totalInstallments).length>0&&<>
              <div className="sec-hdr" style={{marginTop:4}}>рҹҸҰ Cuotas de prГ©stamos</div>
              {loans.filter(l=>l.active&&l.paidInstallments<l.totalInstallments).map(l=>{
                const d=daysUntil(l.dueDay);
                return(<div key={l.id} className="card"><div className="card-row">
                  <div className="card-ic ln">{l.icon}</div>
                  <div className="card-body"><div className="card-title">{l.name}</div><div className="card-meta"><span style={{color:urgColor(d),fontWeight:600}}>в—Ҹ Vence dГӯa {l.dueDay}</span><span style={{color:'#555'}}>В· cuota {l.paidInstallments+1}/{l.totalInstallments}</span></div></div>
                  <div className="card-right"><div className="card-amt ln">-{fmt(l.monthlyPayment)}</div></div>
                </div></div>);
              })}
              <div className="subtotal-row" style={{background:'#1a0a1f',border:'1px solid #3a104a'}}>
                <span style={{font:'600 12px DM Sans',color:'#c97bf5'}}>Subtotal prГ©stamos</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:'#c97bf5'}}>-{fmt(totalLoans)}</span>
              </div>
            </>}

            {ccThisMonth.length>0&&<>
              <div className="sec-hdr" style={{marginTop:4}}>рҹ’і Cuotas de tarjeta</div>
              {ccThisMonth.map(q=>{
                const cat=getCat(q.category);
                return(<div key={q.parentId+'-'+q.quotaNum} className="card"><div className="card-row">
                  <div className="card-ic cc">{cat.icon}</div>
                  <div className="card-body"><div className="card-title">{q.description}</div><div className="card-meta"><span className="badge">рҹ’і {q.cardName}</span><span className="badge">Cuota {q.quotaNum}</span></div></div>
                  <div className="card-right"><div className="card-amt cc">-{fmt(q.amount)}</div></div>
                </div></div>);
              })}
              <div className="subtotal-row" style={{background:'#0f0f1f',border:'1px solid #1e1e3d'}}>
                <span style={{font:'600 12px DM Sans',color:'#7b87f5'}}>Subtotal tarjeta</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:'#7b87f5'}}>-{fmt(totalCC)}</span>
              </div>
            </>}

            {totalFiado>0&&<>
              <div className="sec-hdr" style={{marginTop:4}}>рҹҸӘ Fiado pendiente</div>
              {stores.filter(s=>(fiadoByStore[s.id]&&fiadoByStore[s.id].total>0)).map(s=>(
                <div key={s.id} className="card"><div className="card-row">
                  <div className="card-ic fi">рҹҸӘ</div>
                  <div className="card-body"><div className="card-title">{s.name}</div><div className="card-meta"><span className="badge orange">{fiadoByStore[s.id].items.length} Гӯtem(s)</span></div></div>
                  <div className="card-right"><div className="card-amt fi">-{fmt(fiadoByStore[s.id].total)}</div></div>
                </div></div>
              ))}
              <div className="subtotal-row" style={{background:'#1f100a',border:'1px solid #4a2a10'}}>
                <span style={{font:'600 12px DM Sans',color:'#e8893a'}}>Subtotal fiado</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:'#e8893a'}}>-{fmt(totalFiado)}</span>
              </div>
            </>}

            {/* SALDO FINAL */}
            <div style={{marginTop:8,background:'linear-gradient(135deg,#1a1a0a,#0f0f05)',border:'2px solid #c9a84c',borderRadius:16,padding:'16px 14px'}}>
              <div style={{font:'600 11px DM Sans',color:'#c9a84c',letterSpacing:2,textTransform:'uppercase',marginBottom:10}}>Resumen вҖ” {fmtMonth(viewMonth)}</div>
              <div style={{display:'flex',justifyContent:'space-between',font:'500 13px DM Sans',color:'#aaa',marginBottom:6}}>
                <span>Total ingresos</span><span style={{color:'#4ecb4e',fontWeight:600}}>+{fmt(totalIncome)}</span>
              </div>
              <div style={{height:1,background:'#2a2a1a',margin:'8px 0'}}/>
              {totalCashExp>0&&<div style={{display:'flex',justifyContent:'space-between',font:'500 12px DM Sans',color:'#888',marginBottom:4}}><span>Gastos efectivo</span><span>-{fmt(totalCashExp)}</span></div>}
              {totalFixed>0&&<div style={{display:'flex',justifyContent:'space-between',font:'500 12px DM Sans',color:'#888',marginBottom:4}}><span>Gastos fijos</span><span>-{fmt(totalFixed)}</span></div>}
              {totalLoans>0&&<div style={{display:'flex',justifyContent:'space-between',font:'500 12px DM Sans',color:'#888',marginBottom:4}}><span>PrГ©stamos</span><span>-{fmt(totalLoans)}</span></div>}

          {txForm.paymentMethod!=='fiado'&&<div className="fgroup"><div className="flabel">CategorГӯa</div>
            <div className="cat-grid">{categories[txForm.type].map(cat=>(
              <button key={cat.id} className={'cbt'+(txForm.category===cat.id?' sel':'')} onClick={()=>setTxForm(f=>({...f,category:cat.id}))}>
                <div className="cbt-ic">{cat.icon}</div><div className="cbt-nm">{cat.label}</div>
              </button>
            ))}</div>
          </div>}
          <button className="btn-sub" onClick={handleTxSubmit}>Agregar</button>
          <button className="btn-can" onClick={()=>{setShowTxForm(false);setTxForm(emptyTx());}}>Cancelar</button>
        </div>
      </div>}

      {showFixedForm&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&(setShowFixedForm(false),setFixedForm(emptyFixed()),setEditFixedId(null))}>
        <div className="modal">
          <div className="modal-title">{editFixedId?'Editar gasto fijo':'Nuevo gasto fijo'}</div>
          <div className="fgroup"><div className="flabel">Nombre</div><input className="finput" placeholder="Ej: Alquiler, LuzвҖҰ" value={fixedForm.name} onChange={e=>setFixedForm(f=>({...f,name:e.target.value}))}/></div>
          <div className="fgroup"><div className="flabel">ГҚcono</div><div className="icon-grid">{FIXED_ICONS.map(ic=><button key={ic} className={'icbtn'+(fixedForm.icon===ic?' sel':'')} onClick={()=>setFixedForm(f=>({...f,icon:ic}))}>{ic}</button>)}</div></div>
          <div className="row2">
            <div className="fgroup"><div className="flabel">Monto ($)</div><input className="finput" type="number" placeholder="0" value={fixedForm.amount} onChange={e=>setFixedForm(f=>({...f,amount:e.target.value}))}/></div>
            <div className="fgroup"><div className="flabel">DГӯa de vencimiento</div><input className="finput" type="number" min="1" max="31" placeholder="15" value={fixedForm.dueDay} onChange={e=>setFixedForm(f=>({...f,dueDay:e.target.value}))}/></div>
          </div>
          <button className="btn-sub" onClick={handleFixedSubmit}>{editFixedId?'Guardar':'Agregar'}</button>
          <button className="btn-can" onClick={()=>{setShowFixedForm(false);setFixedForm(emptyFixed());setEditFixedId(null);}}>Cancelar</button>
        </div>
      </div>}

      {showLoanForm&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&(setShowLoanForm(false),setLoanForm(emptyLoan()),setEditLoanId(null))}>
        <div className="modal">
          <div className="modal-title">{editLoanId?'Editar prГ©stamo':'Nuevo prГ©stamo'}</div>
          <div className="fgroup"><div className="flabel">Nombre</div><input className="finput" placeholder="Ej: PrГ©stamo bancoвҖҰ" value={loanForm.name} onChange={e=>setLoanForm(f=>({...f,name:e.target.value}))}/></div>
          <div className="fgroup"><div className="flabel">ГҚcono</div><div className="icon-grid">{LOAN_ICONS.map(ic=><button key={ic} className={'icbtn'+(loanForm.icon===ic?' sel':'')} onClick={()=>setLoanForm(f=>({...f,icon:ic}))}>{ic}</button>)}</div></div>
          <div className="row2">
            <div className="fgroup"><div className="flabel">Monto total ($)</div><input className="finput" type="number" placeholder="0" value={loanForm.totalAmount} onChange={e=>setLoanForm(f=>({...f,totalAmount:e.target.value}))}/></div>
            <div className="fgroup"><div className="flabel">Cuota mensual ($)</div><input className="finput" type="number" placeholder="0" value={loanForm.monthlyPayment} onChange={e=>setLoanForm(f=>({...f,monthlyPayment:e.target.value}))}/></div>
          </div>
          <div className="row2">
            <div className="fgroup"><div className="flabel">Total cuotas</div><input className="finput" type="number" placeholder="24" value={loanForm.totalInstallments} onChange={e=>setLoanForm(f=>({...f,totalInstallments:e.target.value}))}/></div>
            <div className="fgroup"><div className="flabel">Cuotas pagadas</div><input className="finput" type="number" placeholder="0" value={loanForm.paidInstallments} onChange={e=>setLoanForm(f=>({...f,paidInstallments:e.target.value}))}/></div>
          </div>
          <div className="row2">
            <div className="fgroup"><div className="flabel">DГӯa de vencimiento</div><input className="finput" type="number" min="1" max="31" placeholder="10" value={loanForm.dueDay} onChange={e=>setLoanForm(f=>({...f,dueDay:e.target.value}))}/></div>
            <div className="fgroup"><div className="flabel">Mes de inicio</div><input className="finput" type="month" value={loanForm.startMonth} onChange={e=>setLoanForm(f=>({...f,startMonth:e.target.value}))}/></div>
          </div>
          {loanForm.monthlyPayment&&loanForm.totalInstallments&&<div style={{background:'#1a0a1f',border:'1px solid #3a1050',borderRadius:10,padding:'10px 14px',marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#aaa'}}><span>Cuotas restantes:</span><span style={{color:'#c97bf5',fontWeight:700}}>{parseInt(loanForm.totalInstallments||0)-parseInt(loanForm.paidInstallments||0)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#aaa',marginTop:4}}><span>Saldo pendiente:</span><span style={{color:'#c97bf5',fontWeight:700}}>{fmt((parseInt(loanForm.totalInstallments||0)-parseInt(loanForm.paidInstallments||0))*parseFloat(loanForm.monthlyPayment||0))}</span></div>
          </div>}
          <button className="btn-sub" onClick={handleLoanSubmit}>{editLoanId?'Guardar':'Agregar prГ©stamo'}</button>
          <button className="btn-can" onClick={()=>{setShowLoanForm(false);setLoanForm(emptyLoan());setEditLoanId(null);}}>Cancelar</button>
        </div>
      </div>}

      {showStoreModal&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowStoreModal(false)}>
        <div className="modal">
          <div className="modal-title">Nuevo almacГ©n</div>
          <div className="fgroup"><div className="flabel">Nombre</div><input className="finput" placeholder="Ej: AlmacГ©n Don Pedro" value={newStoreName} onChange={e=>setNewStoreName(e.target.value)}/></div>
          <div className="fgroup"><div className="flabel">Color</div><div className="color-row">{STORE_COLORS.map(c=><div key={c} className={'color-dot'+(newStoreColor===c?' sel':'')} style={{background:c}} onClick={()=>setNewStoreColor(c)}/>)}</div></div>
          <button className="btn-sub" onClick={()=>{if(!newStoreName.trim())return;setStores(p=>[...p,{id:'s'+Date.now(),name:newStoreName.trim(),color:newStoreColor}]);setNewStoreName('');setShowStoreModal(false);}}>Guardar almacГ©n</button>
          <button className="btn-can" onClick={()=>setShowStoreModal(false)}>Cancelar</button>
        </div>
      </div>}

      {showAccForm&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&(setShowAccForm(false),setEditAccId(null))}>
        <div className="modal">
          <div className="modal-title">{editAccId?'Editar cuenta':'Nueva cuenta'}</div>
          <div className="fgroup"><div className="flabel">Nombre</div><input className="finput" placeholder="Ej: Banco Galicia, Mercado PagoвҖҰ" value={accForm.name} onChange={e=>setAccForm(f=>({...f,name:e.target.value}))}/></div>
          <div className="fgroup">
            <div className="flabel">Tipo</div>
            <div style={{display:'flex',gap:6}}>
              {[['bank','рҹҸҰ Banco'],['wallet','рҹ“ұ Billetera'],['cash','рҹ’° Efectivo']].map(([t,l])=>(
                <button key={t} onClick={()=>setAccForm(f=>({...f,type:t}))}
                  style={{flex:1,padding:'9px 4px',border:'2px solid '+(accForm.type===t?'#c9a84c':'#222'),borderRadius:10,background:accForm.type===t?'#1c180a':'#0c0c0f',color:accForm.type===t?'#c9a84c':'#555',fontSize:12,fontWeight:500,cursor:'pointer'}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div className="fgroup"><div className="flabel">ГҚcono</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {ACC_ICONS.map(ic=><button key={ic} className={'icbtn'+(accForm.icon===ic?' sel':'')} onClick={()=>setAccForm(f=>({...f,icon:ic}))}>{ic}</button>)}
            </div>
          </div>
          <div className="fgroup"><div className="flabel">Color</div>
            <div className="color-row">{ACC_COLORS.map(col=><div key={col} className={'color-dot'+(accForm.color===col?' sel':'')} style={{background:col}} onClick={()=>setAccForm(f=>({...f,color:col}))}/>)}</div>
          </div>
          <div className="fgroup"><div className="flabel">Saldo inicial ($)</div><input className="finput" type="number" placeholder="0" value={accForm.balance} onChange={e=>setAccForm(f=>({...f,balance:e.target.value}))}/></div>
          <button className="btn-sub" onClick={handleAccSubmit}>{editAccId?'Guardar cambios':'Agregar cuenta'}</button>
          <button className="btn-can" onClick={()=>{setShowAccForm(false);setEditAccId(null);}}>Cancelar</button>
        </div>
      </div>}

      {showCatForm&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&(setShowCatForm(false),setCatForm({label:'',icon:'рҹӣ’'}),setEditCatId(null))}>
        <div className="modal">
          <div className="modal-title">{editCatId?'Editar categorГӯa':'Nueva categorГӯa'}</div>
          <div className="fgroup"><div className="flabel">Nombre</div><input className="finput" placeholder="Ej: Mascota, GimnasioвҖҰ" value={catForm.label} onChange={e=>setCatForm(f=>({...f,label:e.target.value}))}/></div>
          <div className="fgroup"><div className="flabel">ГҚcono</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:6,marginTop:4}}>
              {EMOJI_OPTIONS.map(em=>(
                <button key={em} onClick={()=>setCatForm(f=>({...f,icon:em}))}
                  style={{width:36,height:36,borderRadius:9,border:'2px solid '+(catForm.icon===em?'#c9a84c':'#222'),background:catForm.icon===em?'#1c180a':'#0c0c0f',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {em}
                </button>
              ))}
            </div>
          </div>
          <button className="btn-sub" onClick={handleCatSubmit}>{editCatId?'Guardar cambios':'Agregar'}</button>
          <button className="btn-can" onClick={()=>{setShowCatForm(false);setCatForm({label:'',icon:'рҹӣ’'});setEditCatId(null);}}>Cancelar</button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
</html>
